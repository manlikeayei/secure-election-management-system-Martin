version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: votesecure-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: voting_system
      MYSQL_USER: voting_admin
      MYSQL_PASSWORD: V0t1ngS3cur3!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: votesecure-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: voting_admin
      DB_PASSWORD: V0t1ngS3cur3!
      DB_NAME: voting_system
      SECRET_KEY: change-me-to-a-random-64-char-string
      JWT_SECRET_KEY: change-me-to-another-random-string
      AES_KEY: b7f8c9a1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8
      ADMIN_EMAIL: admin@votingsystem.com
      ADMIN_PASSWORD: Admin@123!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
    container_name: votesecure-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
